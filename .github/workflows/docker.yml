name: Docker CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t todo-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t todo-frontend:ci ./frontend